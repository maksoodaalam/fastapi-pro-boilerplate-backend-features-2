<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>API Health Check</title>

<meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self';
        style-src 'self' https://cdn.jsdelivr.net;
      "
>
  <!--  This will get blocked-->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
    integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
    crossorigin="anonymous"
  />

</head>
<body>
  <h1>FastAPI Health Check</h1>
  <button onclick="checkHealth()">Check API</button>
  <button onclick="putCheck()">PUT check</button>
  <pre id="output"></pre>



  <script>
    async function checkHealth() {
      const output = document.getElementById("output");
      output.textContent = "Calling API...";

      try {
        const response = await fetch("http://127.0.0.1:8001/api/v1/health");
        if (!response.ok) {
          throw new Error(`HTTP error! Status: ${response.status}`);
        }
        const data = await response.json();
        output.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        output.textContent = "Error: " + error.message;
      }
    }

    async function putCheck() {
      const output = document.getElementById("output");
      output.textContent = "Calling PUT API...";

      const authToken = ""; // paste JWT when testing
      const csrfToken = ""; // set when your API provides CSRF

      const myHeaders = new Headers();
      myHeaders.append("Content-Type", "application/json");
      myHeaders.append("Accept", "application/json");
      myHeaders.append("X-Requested-With", "XMLHttpRequest");
      myHeaders.append("X-CSRF-Token", csrfToken);
      if (authToken) myHeaders.append("Authorization", `Bearer ${authToken}`);

      // Intentionally absent from CorsOp allowed_headers (CORS preflight test).
      myHeaders.append("X-Custom-Header", "probe");
      myHeaders.append("X-API-Key", "local-demo-key");
      myHeaders.append("Idempotency-Key", crypto.randomUUID());

      const raw = JSON.stringify({ name: "Hi" });

      const requestOptions = {
        method: "PUT",
        headers: myHeaders,
        body: raw,
        redirect: "follow",
      };

      try {
        const response = await fetch(
          "http://127.0.0.1:8001/api/v1/putcheck",
          requestOptions
        );
        const result = await response.text();
        if (!response.ok) {
          throw new Error(`HTTP error! Status: ${response.status}\n${result}`);
        }
        output.textContent = result;
      } catch (error) {
        output.textContent = "Error: " + error.message;
      }
    }
  </script>
</body>
</html>
