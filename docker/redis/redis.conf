# -----------------------------------
# Redis Production Configuration
# -----------------------------------

bind 0.0.0.0
protected-mode yes
port 6379

# --- Memory Management ---
# Set maximum memory limit (adjust based on your server capacity)
maxmemory 512mb
# Eviction policy when maxmemory is reached (least recently used keys first)
maxmemory-policy allkeys-lru

# --- Persistence (AOF) ---
# Append Only File ensures durability by logging every write operation
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# --- Logging ---
loglevel notice
