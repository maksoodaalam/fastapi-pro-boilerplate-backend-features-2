# PostgreSQL runtime settings (used via -c config_file=... in docker-compose).
# Defaults are used for any parameter not listed here.
# Reference: https://www.postgresql.org/docs/current/runtime-config.html

# Required in Docker so other containers and the host can connect on 5432.
listen_addresses = '*'

# Optional tunables (uncomment and adjust as needed):
max_connections = 100
shared_buffers = 256MB
# work_mem = 16MB
effective_cache_size=768MB
