
name: fastapi-boilerplat

networks:
  dc_network:
    driver: bridge

volumes:
  postgres_data_volume:
    driver: local
  redis_data_volume:
    driver: local

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${DB_USER:?Set DB_USER in .env.docker}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env.docker}
      POSTGRES_DB: ${DB_NAME:?Set DB_NAME in .env.docker}
      # UTF-8 cluster; Alpine image has no full en_US.UTF-8 locale by default
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data_volume:/var/lib/postgresql/data
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - dc_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      sh -c '
      echo "user default off" > /etc/redis/users.acl &&
      echo "user $${REDIS_USER} on >$${REDIS_PASSWORD} ~* &* +@all" >> /etc/redis/users.acl &&
      redis-server /etc/redis/redis.conf --aclfile /etc/redis/users.acl
      '
    ports:
      - "6380:6379"
    volumes:
      - redis_data_volume:/data
      - ./docker/redis/redis.conf:/etc/redis/redis.conf:ro
    environment:
      - REDIS_USER=${REDIS_USER:-docsprint_redis}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-strong-redis-password}
    networks:
      - dc_network

  # api:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   restart: unless-stopped
  #   environment:
  #     - DB_USER=${DB_USER}
  #     - DB_PASSWORD=${DB_PASSWORD}
  #     - DB_NAME=${DB_NAME}
  #     - REDIS_USER=${REDIS_USER}
  #     - REDIS_PASSWORD=${REDIS_PASSWORD}
  #     - APP_PORT=8080
  #     # Add other required environment variables here
  #   depends_on:
  #     - postgres
  #     - redis
  #   networks:
  #     - dc_network

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443" # Uncomment if using SSL
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - dc_network



